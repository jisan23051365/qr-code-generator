<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced QR Studio - Sameeul Khondokar Jisan</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg: linear-gradient(135deg,#667eea,#764ba2);
--card:#ffffff;
--text:#222;
--accent:#764ba2;
}

.dark{
--bg: linear-gradient(135deg,#1f1f2e,#121212);
--card:#1e1e2f;
--text:#f1f1f1;
--accent:#9f7aea;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
transition:0.4s;
}

.container{
background:var(--card);
width:1000px;
max-width:100%;
border-radius:25px;
padding:35px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.profile{
display:flex;
align-items:center;
gap:15px;
}

.profile img{
width:85px;
height:85px;
border-radius:50%;
border:3px solid var(--accent);
object-fit:cover;
}

h1{font-size:22px;}

.toggle{
cursor:pointer;
padding:8px 15px;
border-radius:30px;
background:var(--accent);
color:white;
border:none;
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.input-section{
display:flex;
gap:10px;
}

input[type="text"]{
flex:1;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.generate-btn{background:var(--accent);color:white;}
.download-btn{background:#28a745;color:white;}
.clear-btn{background:#dc3545;color:white;}
.export-btn{background:#17a2b8;color:white;}

button:hover{
opacity:0.85;
transform:scale(1.05);
}

.preview{
text-align:center;
margin-top:20px;
}

.preview img{
margin:15px 0;
transition:0.4s;
}

.history{
margin-top:25px;
}

.history input{
width:100%;
padding:10px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #ccc;
}

.history-list{
max-height:200px;
overflow-y:auto;
}

.history-item{
padding:8px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.history-item:hover{
background:rgba(0,0,0,0.05);
}

.slider{
display:flex;
align-items:center;
gap:10px;
}

input[type="range"]{
width:100%;
}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
opacity:0.7;
}

@media(max-width:768px){
.controls{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="profile">
<img src="jisan.jpg">
<div>
<h1>Sameeul Khondokar Jisan</h1>
<p>Advanced QR Studio</p>
</div>
</div>

<button class="toggle" onclick="toggleMode()">Toggle Mode</button>

</div>

<div class="controls">

<div>

<div class="input-section">
<input type="text" id="qrText" placeholder="Enter text or URL">
<button class="generate-btn" onclick="generateQR()">Generate</button>
</div>

<div class="slider">
<label>Size:</label>
<input type="range" min="100" max="500" value="300" id="sizeSlider">
<span id="sizeValue">300</span>px
</div>

<div style="margin-top:10px;">
<label>Foreground:</label>
<input type="color" id="fgColor" value="#000000">
<label>Background:</label>
<input type="color" id="bgColor" value="#ffffff">
</div>

</div>

<div class="preview">
<img id="qrImage" style="display:none;">
<br>
<button class="download-btn" onclick="downloadQR()" style="display:none;">Download</button>
</div>

</div>

<div class="history">

<h3>History</h3>

<input type="text" id="searchHistory" placeholder="Search history..." onkeyup="filterHistory()">

<div class="history-list" id="historyList"></div>

<button class="clear-btn" onclick="clearHistory()">Clear History</button>
<button class="export-btn" onclick="exportHistory()">Export History</button>

</div>

<div class="footer">
© 2026 QR Studio | Designed & Engineered by Jisan
</div>

</div>

<script>

const qrImage=document.getElementById('qrImage');
const sizeSlider=document.getElementById('sizeSlider');
const sizeValue=document.getElementById('sizeValue');
const historyList=document.getElementById('historyList');

sizeSlider.oninput=()=>sizeValue.textContent=sizeSlider.value;

document.getElementById('qrText').addEventListener("keypress",function(e){
if(e.key==="Enter") generateQR();
});

function generateQR(){

const text=document.getElementById('qrText').value.trim();
if(!text) return alert("Enter text first!");

const size=sizeSlider.value;
const fg=document.getElementById('fgColor').value.replace('#','');
const bg=document.getElementById('bgColor').value.replace('#','');

const url=`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&color=${fg}&bgcolor=${bg}`;

qrImage.src=url;
qrImage.style.display="block";
qrImage.style.width=size+"px";

document.querySelector('.download-btn').style.display="inline-block";

localStorage.setItem("lastQR",JSON.stringify({text,url}));

saveHistory(text,url);

}

function downloadQR(){

const link=document.createElement('a');
link.href=qrImage.src;
link.download="QR_"+Date.now()+".png";
link.click();

}

function saveHistory(text,url){

let history=JSON.parse(localStorage.getItem('qrHistory'))||[];

history.unshift({text,url});

localStorage.setItem('qrHistory',JSON.stringify(history));

loadHistory();

}

function loadHistory(){

historyList.innerHTML="";

let history=JSON.parse(localStorage.getItem('qrHistory'))||[];

history.forEach(item=>{

const div=document.createElement('div');
div.className="history-item";
div.textContent=item.text;

div.onclick=()=>{
qrImage.src=item.url;
qrImage.style.display="block";
document.querySelector('.download-btn').style.display="inline-block";
};

historyList.appendChild(div);

});

}

function filterHistory(){

const search=document.getElementById('searchHistory').value.toLowerCase();

document.querySelectorAll('.history-item').forEach(item=>{
item.style.display=item.textContent.toLowerCase().includes(search)?"block":"none";
});

}

function clearHistory(){

localStorage.removeItem('qrHistory');
loadHistory();

}

function exportHistory(){

let history=JSON.parse(localStorage.getItem('qrHistory'))||[];

if(history.length===0){
alert("No QR history available yet.");
return;
}

const blob=new Blob([JSON.stringify(history,null,2)],{type:"application/json"});

const link=document.createElement('a');

link.href=URL.createObjectURL(blob);

link.download="qr_history.json";

link.click();

}

function toggleMode(){

document.body.classList.toggle("dark");

localStorage.setItem("theme",document.body.classList.contains("dark"));

}

window.onload=()=>{

if(localStorage.getItem("theme")==="true"){
document.body.classList.add("dark");
}

loadHistory();

let last=JSON.parse(localStorage.getItem("lastQR"));

if(last){
qrImage.src=last.url;
qrImage.style.display="block";
document.querySelector('.download-btn').style.display="inline-block";
}

};

</script>

</body>
</html>
